receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

exporters:
  debug:
    verbosity: basic

  # ClickHouse — traces, metrics, and logs stored in the otel database
  clickhouse:
    endpoint: "tcp://clickhouse-s1r1.railway.internal:9000?dial_timeout=10s&compress=lz4"
    database: otel
    username: default
    password: "${env:CLICKHOUSE_PASSWORD}"
    ttl: 720h
    create_schema: true
    async_insert: true
    compress: lz4
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  prometheus:
    endpoint: "0.0.0.0:8889"
    const_labels:
      service: milady

  zipkin:
    endpoint: "http://zipkin.railway.internal:9411/api/v2/spans"
    format: proto

  otlp/jaeger:
    endpoint: jaeger.railway.internal:4317
    tls:
      insecure: true

processors:
  batch:
    send_batch_size: 10000
    timeout: 5s
    send_batch_max_size: 11000

  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  pprof:
    endpoint: "0.0.0.0:1888"
  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [pprof, zpages, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [clickhouse, zipkin, otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [clickhouse, prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [clickhouse, debug]
  telemetry:
    logs:
      level: info
    metrics:
      address: "0.0.0.0:8888"
